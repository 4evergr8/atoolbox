  share_handler: ^0.0.25
  charset_converter : ^2.4.0
  wakelock_plus: ^1.6.1
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5
  share_plus: ^13.1.0
  flutter_launcher_icons: ^0.14.4
  path_provider: ^2.1.6
  image_picker: ^1.2.2
  share_handler_platform_interface: ^0.0.6
  google_mlkit_text_recognition: ^0.15.1
  path: ^1.9.1
  open_file: ^3.5.11
  flutter_native_splash: ^2.4.8
