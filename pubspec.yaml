name: atoolbox
description: "A Toolbox"
publish_to: 'none'

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#000000"
  image: assets/aaa.png
  android: true
  ios: false
version: 1.4.5+10
environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  google_fonts: ^8.1.0
  archive: ^4.0.9
  json2yaml: ^3.0.1
  google_mlkit_barcode_scanning: ^0.14.2
  network_info_plus: ^8.1.0
  google_mobile_ads: ^9.0.0
